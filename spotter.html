<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RBN Spotter</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#111111;--bg2:#111111;--text:#e0e0e0;--text2:#888;--text3:#666;--text4:#9e9e9e;--border:#333;--border2:#222;--accent:#2196f3;--accent-hover:#1976d2;--accent-bg:rgba(33,150,243,0.08);--link:#888}
[data-theme="light"]{--bg:#f5f5f5;--bg2:#ffffff;--text:#222;--text2:#666;--text3:#999;--text4:#555;--border:#ddd;--border2:#e5e5e5;--accent:#1976d2;--accent-hover:#1565c0;--accent-bg:rgba(25,118,210,0.08);--link:#555}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:860px;margin:0 auto}

.top{display:flex;gap:12px;align-items:center;padding:8px 16px;margin:12px 0;background:var(--bg)}
.top .inp{flex:1;min-width:0;padding:8px 12px;border:1px solid var(--border);border-radius:4px;background:var(--bg2);color:var(--text);font-size:16px;font-weight:700;text-transform:uppercase;outline:none}
.top .inp:focus{border-color:var(--accent)}
.top .btn-search{padding:8px 40px;border:none;border-radius:4px;background:var(--accent);color:white;font-size:16px;font-weight:700;cursor:pointer;white-space:nowrap}
.top .btn-search:hover{background:var(--accent-hover)}
.top .status{display:none}

.page-header{padding:16px 16px 0;margin-bottom:12px}
.page-header-left{position:relative}
.page-header-left h1{font-size:18px;color:var(--text);font-weight:700;margin-bottom:4px}
.page-header-left p{font-size:13px;color:var(--text2);line-height:1.6}
.page-header-left .time-select{background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:3px;font-size:13px;padding:1px 4px;cursor:pointer;outline:none}
.page-header-left .time-select:focus{border-color:var(--accent)}
.page-header .theme-toggle{position:absolute;top:0;right:0}
.theme-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;font-size:13px;color:var(--text2)}
.theme-toggle input{display:none}
.theme-toggle .slider{width:72px;height:36px;background:#1a1a2e;border-radius:18px;position:relative;transition:background .3s;border:2px solid #333}
.theme-toggle .slider::after{content:"";position:absolute;top:3px;left:3px;width:26px;height:26px;background:#b3b3b3;border-radius:50%;transition:transform .3s,background .3s}
.theme-toggle .slider .icon-dark{position:absolute;top:7px;right:12px;font-size:16px;line-height:1;color:#ffd700;pointer-events:none}
.theme-toggle .slider .icon-light{position:absolute;top:50%;left:11px;transform:translateY(-50%);font-size:20px;line-height:1;color:#f59e0b;pointer-events:none;display:none}
.theme-toggle input:checked+.slider{background:#e8e8e8;border-color:#ccc}
.theme-toggle input:checked+.slider::after{transform:translateX(36px);background:#808080}
.theme-toggle input:checked+.slider .icon-dark{display:none}
.theme-toggle input:checked+.slider .icon-light{display:block}

.status-bar{padding:0 16px;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:4px;margin:12px 0;flex-wrap:wrap}
.band-item{cursor:pointer;user-select:none;transition:opacity .2s}
.band-item.disabled{opacity:0.3}

.table-wrap{overflow-x:auto;padding:0 16px 8px}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:14px;margin-top:4px}
th{background:var(--bg);color:var(--text4);padding:8px 12px;text-align:left;position:sticky;top:0;white-space:nowrap;border-bottom:0.5px solid var(--text4);overflow:hidden;text-overflow:ellipsis}
th.col-heard{padding-left:0}
th.th-right{text-align:right}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--accent)}
th .sort-icon{margin-left:4px;font-size:10px;opacity:0.4}
th.sort-active .sort-icon{opacity:1;color:var(--accent)}
td{padding:8px 12px;border-bottom:1px solid var(--border2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-heard{min-width:140px;background:var(--bg);padding-left:0!important}
.col-qrb{min-width:90px}
.col-freq{min-width:100px;padding-right:0!important;text-align:right!important}
.col-snr{min-width:80px}
.col-time{min-width:80px}
tr:hover td{background:var(--accent-bg)}
.heard-cs{color:var(--text);font-weight:700}
.freq{color:var(--text);text-align:right}
.dist{color:var(--text);text-align:right}
.snr{color:var(--text);text-align:right;font-weight:700}
.snr-strong{color:#4caf50}
.snr-ok{color:#eab308}
.snr-weak{color:#f97316}
.flag{width:20px;height:14px;vertical-align:middle;margin-right:4px;border-radius:2px}
.time{color:var(--text);text-align:right}
.time-date{color:var(--text3);margin-left:4px}
.no-spots{text-align:left;padding:0;color:var(--text2);font-size:13px}
.no-spots a{color:var(--link);text-decoration:none}
.no-spots a:hover{color:var(--accent);text-decoration:underline}
#map-section{padding:0 16px 0;margin-bottom:12px}
#map{width:100%;height:450px;border-radius:8px;border:1px solid var(--border)}
.leaflet-control-attribution{font-size:9px!important;opacity:0.4}
.leaflet-control-attribution a:first-child{display:none}
.leaflet-control-zoom a{opacity:0.4}
.pulse{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spot-highlight{0%{background:rgba(33,150,243,0.25)}100%{background:transparent}}
tr.spot-new td{animation:spot-highlight 4s ease-out}

@media(max-width:600px){
  .top{padding:8px 16px}
  .top .inp{padding:8px}
  .top .btn-search{padding:8px 20px;font-size:14px}
  #map{height:330px}
  table{font-size:12px}
  th{padding:6px 6px;white-space:normal;line-height:1.3}
  td{padding:6px 6px}
  .col-heard{min-width:110px}
  .col-qrb{min-width:55px}
  .col-freq{min-width:70px}
  .col-snr{min-width:50px}
  .col-time{min-width:55px}
  .flag{width:16px;height:11px;margin-right:2px}
}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-left">
    <h1>Simple RBN Spotter <span style="opacity:0.3">by R4NCU</span></h1>
    <label class="theme-toggle">
      <input type="checkbox" id="theme-switch">
      <span class="slider">
        <span class="icon-dark">&#9790;</span>
        <span class="icon-light">&#9728;</span>
      </span>
    </label>
    <p>
      Кого услышал за <select class="time-select" id="time-range"><option value="300">5 минут</option><option value="900">15 минут</option><option value="1800">30 минут</option><option value="3600" selected>час</option><option value="21600">6 часов</option><option value="43200">12 часов</option><option value="86400">24 часа</option></select>. Обновление раз в 5 сек<br>
      SNR: <span style="color:#4caf50">≥20 дБ</span> · <span style="color:#eab308">≥10 дБ</span> · <span style="color:#f97316">≥0 дБ</span>
    </p>
  </div>
</div>

<div id="map-section">
  <div id="map"></div>
</div>

<div class="top">
  <input class="inp" type="text" id="callsign" placeholder="Позывной споттера" maxlength="12" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="characters" inputmode="text" autofocus>
  <button class="btn-search" onclick="startSearch()">Поиск</button>
</div>

<div class="status-bar">
  <span id="status-text"></span>
</div>

<div class="table-wrap">
  <div class="no-spots" id="no-spots">Введите позывной споттера и нажмите «Поиск»</div>
  <table id="spots-table" style="display:none">
    <thead>
      <tr>
        <th class="col-heard">Heard</th>
        <th class="sortable th-right col-qrb" data-sort="dist">QRB,<br>km <span class="sort-icon">⇅</span></th>
        <th class="sortable th-right col-snr" data-sort="snr">SNR,<br>дБ <span class="sort-icon">⇅</span></th>
        <th class="sortable th-right col-time" data-sort="time">Time<br>&nbsp;<span class="sort-icon">⇅</span></th>
        <th class="col-freq" style="text-align:right">Freq</th>
      </tr>
    </thead>
    <tbody id="spots-body"></tbody>
  </table>
</div>

<div style="padding:0 16px 24px">
  <a href="https://github.com/r4ncu/simple_rbn_spotter" target="_blank" style="font-size:12px;color:var(--text3);text-decoration:none">https://github.com/r4ncu/simple_rbn_spotter</a>
</div>

let currentBounds = null;
let autoFit = true;
let fittingBounds = false;
let openPopup = null;
let updatingLayers = false;
let currentPopupMarker = null;
let knownIds = new Set();

const DARK_TILES = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
const LIGHT_TILES = "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png";

let tileLayer = null;
let currentTheme = localStorage.getItem("rbn-spotter-theme") || "dark";

function applyTheme(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute("data-theme", theme);
  $("theme-switch").checked = theme === "light";
  localStorage.setItem("rbn-spotter-theme", theme);
  if (tileLayer) {
    const url = theme === "light" ? LIGHT_TILES : DARK_TILES;
    tileLayer.setUrl(url);
  }
}

function applyFitBounds() {
  if (autoFit && currentBounds && map) {
    fittingBounds = true;
    map.invalidateSize();
    map.fitBounds(currentBounds, {padding: [0, 0], animate: false});
    fittingBounds = false;
  }
}

let resizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(applyFitBounds, 100);
});

const $ = s => document.getElementById(s);

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function snrClass(db) {
  if (db >= 20) return "snr-strong";
  if (db >= 10) return "snr-ok";
  return "snr-weak";
}

function callsignPrefix(callsign) {
  const up = callsign.toUpperCase();
  const m = up.match(/^(\d?[A-Z]+)/);
  if (!m) return up.replace(/[^A-Z0-9]/g, "").slice(0, 2);
  return m[1].slice(0, 2);
}

function flagUrl(callsign) {
  if (!callsign) return "";
  const pfx = callsignPrefix(callsign);
  let iso = PREFIX_TO_ISO[pfx];
  if (!iso && pfx.length === 2) iso = PREFIX_TO_ISO[pfx[0]];
  if (!iso) return "";
  return "https://flagcdn.com/w40/" + iso + ".png";
}

  "8A":"id","8B":"id","8C":"id","8D":"id","8E":"id","8F":"id","8G":"id","8H":"id","8I":"id","8J":"jp","8K":"jp","8L":"jp","8M":"jp","8N":"jp","8O":"bw","8P":"bb","8Q":"mv","8R":"gy","8S":"se","8T":"in","8U":"in","8V":"in","8W":"in","8Y":"in","8Z":"sa",

};

let map = null;
let mapLayer = null;

const BAND_COLORS = {
  "630M":"#aaaaaa","160M":"#ffe000","80M":"#2e7d32","60M":"#8a5a2a","40M":"#ffa500","30M":"#ff0000",
  "20M":"#800080","17M":"#2962ff","15M":"#4caf50","12M":"#03ffff","10M":"#ff00ff",
  "6M":"#ffc1cb","4M":"#a276ff","2M":"#92ff7f"
};

function freqToBand(freqKhz) {
  const f = parseFloat(freqKhz);
  if (isNaN(f)) return "OTHR";
  if (f < 500) return "630M";
  if (f < 2000) return "160M";
  if (f < 4000) return "80M";
  if (f < 5500) return "60M";
  if (f < 8000) return "40M";
  if (f < 11000) return "30M";
  if (f < 15000) return "20M";
  if (f < 19000) return "17M";
  if (f < 22000) return "15M";
  if (f < 26000) return "12M";
  if (f < 30000) return "10M";
  if (f < 54000) return "6M";
  if (f < 80000) return "4M";
  if (f < 150000) return "2M";
  return "70CM";
}

function initMap() {
  if (map) { map.remove(); map = null; }
  map = L.map("map", {preferCanvas: true, zoomControl: true}).setView([58.33, 49.75], 3);
  const url = currentTheme === "light" ? LIGHT_TILES : DARK_TILES;
  tileLayer = L.tileLayer(url, {
    attribution: "&copy; OSM &copy; CARTO",
    maxZoom: 18
  }).addTo(map);
  mapLayer = L.layerGroup().addTo(map);
  map.on("zoom movestart", () => { if (!fittingBounds) autoFit = false; });
  map.on("popupopen", (e) => { currentPopupMarker = e.popup._source; });
  map.on("popupclose", () => { if (!fittingBounds && !updatingLayers) { openPopup = null; currentPopupMarker = null; } });
}

function updateMap() {
  const cs = $("callsign").value.trim().toUpperCase();
  const spotterInfo = callInfo[cs];
  const sLat = spotterInfo ? parseFloat(spotterInfo[6]) : null;
  const sLon = spotterInfo ? parseFloat(spotterInfo[7]) : null;

  const now = Date.now() / 1000;
  const filtered = Object.entries(spots).filter(([id, s]) => (now - s[10]) < maxAgeSec);

  const bandCounts = {};
  const activeBands = new Set();
  const points = [];

  if (sLat !== null && sLon !== null) {
    points.push([sLat, sLon]);
  }

  filtered.forEach(([id, s]) => {
    const info = callInfo[s[2]] || [];
    const lat = parseFloat(info[6]);
    const lon = parseFloat(info[7]);
    if (!isNaN(lat) && !isNaN(lon)) points.push([lat, lon]);
    activeBands.add(freqToBand(s[1]));
  });

  allBands = [...activeBands].sort();

  if (!map) initMap();

  if (currentPopupMarker && currentPopupMarker._popup && currentPopupMarker._popup.isOpen()) {
    const ll = currentPopupMarker.getLatLng();
    openPopup = {lat: ll.lat, lng: ll.lng, content: currentPopupMarker._popup.getContent()};
  } else {
    openPopup = null;
  }

  updatingLayers = true;
  mapLayer.clearLayers();
  updatingLayers = false;

  if (sLat !== null && sLon !== null) {
    const myIcon = L.divIcon({
      className: "",
      html: '<div style="width:12px;height:12px;background:#facc15;border:2px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,0.5);"></div>',
      iconSize: [12, 12], iconAnchor: [6, 6]
    });
    L.marker([sLat, sLon], {icon: myIcon, zIndexOffset: 1000}).addTo(mapLayer).bindPopup("<b>" + cs + "</b>" + (countryRu(cs) ? " <span style='color:#888;font-size:12px'>(" + countryRu(cs) + ")</span>" : ""));
  }

  filtered.forEach(([id, s]) => {
    const [de, freq, dx] = s;
    const info = callInfo[dx] || [];
    const lat = parseFloat(info[6]);
    const lon = parseFloat(info[7]);
    if (isNaN(lat) || isNaN(lon)) return;

    const band = freqToBand(freq);
    if (disabledBands.has(band)) return;
    const color = BAND_COLORS[band] || "#888";
    bandCounts[band] = (bandCounts[band] || 0) + 1;

    if (sLat !== null && sLon !== null) {
      L.polyline([[sLat, sLon], [lat, lon]], {color: color, weight: 1.4, opacity: 0.35}).addTo(mapLayer);
    }

    const icon = L.divIcon({
      className: "",
      html: '<div style="width:7px;height:7px;background:' + color + ';border:1px solid rgba(255,255,255,0.3);border-radius:50%;"></div>',
      iconSize: [7, 7], iconAnchor: [3.5, 3.5]
    });
    L.marker([lat, lon], {icon}).addTo(mapLayer).bindPopup("<b>" + dx + "</b>" + (countryRu(dx) ? " <span style='color:#888;font-size:12px'>(" + countryRu(dx) + ")</span>" : "") + "<br>" + freq + " kHz · " + band + "<br>SNR: " + s[3] + " дБ<br>" + formatTime(s[10]) + " UTC<br>" + formatDate(s[10]));
  });

  if (openPopup) {
    map.eachLayer(layer => {
      if (layer instanceof L.Marker && layer.getLatLng) {
        const ll = layer.getLatLng();
        if (Math.abs(ll.lat - openPopup.lat) < 0.0001 && Math.abs(ll.lng - openPopup.lng) < 0.0001) {
          layer.setPopupContent(openPopup.content);
          layer.openPopup();
        }
      }
    });
  }

  if (points.length > 0) {
    currentBounds = L.latLngBounds(points);
    if (autoFit) {
      fittingBounds = true;
      map.invalidateSize();
      map.fitBounds(currentBounds, {padding: [0, 0], animate: false});
      fittingBounds = false;
    }
  }

  const canDisable = allBands.length > 1;
  currentBands = allBands.map(b => {
    const dis = disabledBands.has(b);
    const cls = dis ? ' disabled' : '';
    const click = canDisable ? ' onclick="toggleBand(\'' + b + '\')"' : '';
    const style = ' style="color:' + (dis ? 'var(--text3)' : (BAND_COLORS[b] || "#888")) + '"';
    return '<span class="band-item' + cls + '"' + click + style + '>&#9679; ' + b + '</span>';
  }).join("  ") || "";
}

function formatTime(epoch) {
  if (!epoch) return "";
  const d = new Date(epoch * 1000);
  const hh = String(d.getUTCHours()).padStart(2, "0");
  const mm = String(d.getUTCMinutes()).padStart(2, "0");
  return hh + ":" + mm;
}

function formatDate(epoch) {
  if (!epoch) return "";
  const d = new Date(epoch * 1000);
  const months = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
  return d.getUTCDate() + " " + months[d.getUTCMonth()] + " " + d.getUTCFullYear();
}

function countryRu(callsign) {
  if (!callsign) return "";
  const up = callsign.toUpperCase();
  const letters = up.replace(/[^A-Z]/g, "");
  const pfx = letters.length >= 2 ? letters.slice(0, 2) : up.replace(/[^A-Z0-9]/g, "").slice(0, 2);
  let iso = PREFIX_TO_ISO[pfx];
  if (!iso && pfx.length === 2) iso = PREFIX_TO_ISO[pfx[0]];
  return ISO_TO_RU[iso] || "";
}

  "fo":"Фареры","gi":"Гибралтар","ad":"Андорра","mc":"Монако","sm":"Сан-Марино","va":"Ватикан"

document.querySelectorAll("th.sortable").forEach(th => {
  th.addEventListener("click", () => {
    const field = th.dataset.sort;
    if (sortField === field) {
      sortDir *= -1;
    } else {
      sortField = field;
      sortDir = field === "snr" ? -1 : (field === "time" ? -1 : 1);
    }
    document.querySelectorAll("th.sortable").forEach(t => t.classList.remove("sort-active"));
    th.classList.add("sort-active");
    th.querySelector(".sort-icon").textContent = sortDir === 1 ? "↑" : "↓";
    renderSpots();
  });
});

function startSearch() {
  const cs = $("callsign").value.trim().toUpperCase();
  if (!cs) return;
  $("callsign").value = cs;
  localStorage.setItem("rbn-spotter-callsign", cs);
  lastId = 0;
  spots = {};
  callInfo = {};
  disabledBands = new Set();
  polling = true;
  autoFit = true;
  $("status-text").textContent = "Поиск: " + cs;
  fetchSpots();
  clearInterval(timer);
  timer = setInterval(fetchSpots, REFRESH_MS);
}

function stopSearch() {
  polling = false;
  clearInterval(timer);
}

async function fetchSpots() {
  if (!polling) return;
  const cs = $("callsign").value.trim().toUpperCase();
  if (!cs) return;
  if (!HASH) {
    try {
      const hr = await fetch("/api/hash");
      const hd = await hr.json();
      HASH = hd.hash;
    } catch(e) {}
  }
  const url = API + "?h=" + HASH + "&cde=" + encodeURIComponent(cs) + "&r=" + maxRows + "&s=" + lastId + "&ma=" + maxAgeSec;

  try {
    const resp = await fetch(url);
    if (!resp.ok) { $("status-text").textContent = "Ошибка: " + resp.status; return; }
    const data = await resp.json();
    if (data.error === 888) {
      try {
        const hr = await fetch("/api/hash");
        const hd = await hr.json();
        HASH = hd.hash;
        const retry = await fetch(API + "?h=" + HASH + "&cde=" + encodeURIComponent(cs) + "&r=" + maxRows + "&s=" + lastId + "&ma=" + maxAgeSec);
        if (retry.ok) { const rd = await retry.json(); processSpots(rd); return; }
      } catch(e2) {}
      $("status-text").textContent = "Ошибка хеша, попробуйте обновить страницу";
      return;
    }
    if (data.impossible || data.error) {
      $("no-spots").style.display = "block";
      $("no-spots").textContent = data.impossible || data.error;
      $("spots-table").style.display = "none";
      return;
    }

    processSpots(data);
  } catch (e) {
    $("status-text").textContent = "Ошибка сети";
  }
}

function processSpots(data) {
    if (data.call_info) Object.assign(callInfo, data.call_info);

    if (data.spots) {
      const ids = Object.keys(data.spots);
      ids.forEach(id => { spots[id] = data.spots[id]; });
      if (ids.length > 0) {
        const maxId = Math.max(...ids.map(Number));
        if (maxId > lastId) lastId = maxId;
      }
    }

    renderSpots();
}

function toggleBand(band) {
  const activeCount = allBands.filter(b => !disabledBands.has(b)).length;
  if (disabledBands.has(band)) {
    disabledBands.delete(band);
  } else {
    if (activeCount <= 1) return;
    disabledBands.add(band);
  }
  renderSpots();
}

function renderSpots() {
  const cs = $("callsign").value.trim().toUpperCase();
  const now = Date.now() / 1000;

  const spotterInfo = callInfo[cs];
  const spotterLat = spotterInfo ? parseFloat(spotterInfo[6]) : null;
  const spotterLon = spotterInfo ? parseFloat(spotterInfo[7]) : null;

  const filtered = Object.entries(spots)
    .filter(([id, s]) => (now - s[10]) < maxAgeSec && !disabledBands.has(freqToBand(s[1])));

  filtered.forEach(([id, s]) => {
    const info = callInfo[s[2]] || [];
    s._dist = (spotterLat !== null && info[6]) ? haversine(spotterLat, spotterLon, parseFloat(info[6]), parseFloat(info[7])) : -1;
    s._snr = Number(s[3]);
  });

  if (sortField === "dist") {
    filtered.sort((a, b) => sortDir * (a[1]._dist - b[1]._dist));
  } else if (sortField === "snr") {
    filtered.sort((a, b) => sortDir * (a[1]._snr - b[1]._snr));
  } else if (sortField === "time") {
    filtered.sort((a, b) => sortDir * (Number(a[1][10]) - Number(b[1][10])));
  } else {
    filtered.sort((a, b) => Number(b[0]) - Number(a[0]));
  }

  if (filtered.length === 0) {
    $("no-spots").style.display = "block";
    $("no-spots").textContent = "Спотов от " + cs + " не найдено. Попробуйте позже.";
    $("spots-table").style.display = "none";
    $("status-text").textContent = "";
    if (map && mapLayer) { updatingLayers = true; mapLayer.clearLayers(); updatingLayers = false; }
    currentBands = "";
    return;
  }

  $("no-spots").style.display = "none";
  $("spots-table").style.display = "table";

  const tbody = $("spots-body");
  const frag = document.createDocumentFragment();

  filtered.forEach(([id, s], idx) => {
    const [de, freq, dx, db, wpm, time, diff, band, type, mode, epoch] = s;
    const info = callInfo[dx] || [];
    const distance = s._dist >= 0 ? s._dist.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, "\u2009") : "";

    const tr = document.createElement("tr");
    if (!knownIds.has(id)) tr.classList.add("spot-new");
    const flagHtml = '<img class="flag" src="' + flagUrl(dx) + '" loading="lazy" onerror="this.style.display=\'none\'">';
    tr.innerHTML =
      '<td class="heard-cs col-heard">' + flagHtml + dx + "</td>" +
      '<td class="dist col-qrb">' + distance + "</td>" +
      '<td class="snr ' + snrClass(db) + ' col-snr">' + db + "</td>" +
      '<td class="time col-time">' + formatTime(epoch) + "</td>" +
      '<td class="freq col-freq">' + freq + "</td>";
    frag.appendChild(tr);
  });

  tbody.innerHTML = "";
  tbody.appendChild(frag);
  knownIds = new Set(filtered.map(([id]) => id));
  updateMap();
  $("status-text").innerHTML = (currentBands ? currentBands + " | " : "") + "Обновлено: " + new Date().toLocaleTimeString("ru-RU") + " Спотов: " + filtered.length;
}

let composing = false;
$("callsign").addEventListener("compositionstart", () => { composing = true; });
$("callsign").addEventListener("compositionend", () => {
  composing = false;
  $("callsign").value = $("callsign").value.toUpperCase();
});
$("callsign").addEventListener("keydown", e => {
  if (e.key === "Enter") startSearch();
  if (!composing) $("callsign").value = $("callsign").value.toUpperCase();
});

$("theme-switch").addEventListener("change", (e) => {
  applyTheme(e.target.checked ? "light" : "dark");
});

$("time-range").addEventListener("change", (e) => {
  maxAgeSec = Number(e.target.value);
  if (polling) { lastId = 0; spots = {}; fetchSpots(); }
});

applyTheme(currentTheme);

fetch("/api/hash").then(r => r.json()).then(d => { HASH = d.hash; }).catch(() => {});

const savedCallsign = localStorage.getItem("rbn-spotter-callsign");
if (savedCallsign) {
  $("callsign").value = savedCallsign;
  setTimeout(() => startSearch(), 200);
}

setTimeout(() => initMap(), 100);
</script>
